name: ReorgTest
description: Local Anvil reorg detection test (ClickHouse storage)
project_type: no-code
networks:
- name: polygon
  chain_id: 137
  rpc: http://127.0.0.1:8545
storage:
  clickhouse:
    enabled: true
    drop_each_run: true
contracts:
- name: USDC
  details:
  - network: polygon
    address: "0x3c499c542cEF5E3811e1192ce70d8cC03d5c3359"
  abi: ./abis/ERC20.abi.json
  reorg_safe_distance: 200
  tables:
  - name: replay_balances
    columns:
    - name: holder
      type: address
    - name: total_in
      default: "0"
    events:
    - event: Transfer
      operations:
      - type: upsert
        set:
        - column: holder
          action: set
          value: $to
        - column: total_in
          action: add
          value: $value
        where:
          holder: $to
  include_events:
  - Transfer
